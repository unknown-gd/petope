name: Rust Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Upload Linux binary
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: petope-linux
          path: target/release/petope

      - name: Download Wintun for Windows x64
        if: matrix.os == 'windows-latest'
        run: |
          curl -L -o wintun.zip https://www.wintun.net/builds/wintun-0.14.1.zip
          tar -xf wintun.zip
          copy wintun\bin\amd64\wintun.dll target\release\

      - name: Upload Windows binary with Wintun
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: petope-windows
          path: |
            target/release/petope.exe
            target/release/wintun.dll
